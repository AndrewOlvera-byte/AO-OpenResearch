# DreamerV4 Phase-2 DYNAMICS pretraining, v4.3 — positional action injection:
# the architecture-side fix for weak action conditioning, on top of every
# input/loss/measurement fix so far.
#
# Why v4.3 (cell-conditioned CF diagnosis on the v4.2 5k checkpoint): even
# with clean action inputs (v4.2 junk masking) and cell-weighted flow loss
# (v4), the one-step latent MSE at ISSUED-action cells barely responds to
# action shuffling (+3.7%), while sitting at 0.229 vs 0.061 on other cells —
# the model fails exactly where the action would tell it the answer, and the
# answer there is near-deterministic (70x data lift). Root cause: the stack
# inherited Dreamer 4's conditioning scheme — actions as SEPARATE attention
# tokens — which was designed for global actions (Minecraft camera/buttons).
# MicroRTS actions are per-cell and spatially aligned with the state; routing
# "cell (2,3)'s action -> cell (2,3)'s next latent" through attention is a
# long gradient path whose easy minimum is to ignore the channel.
#
# FIX (model.dynamics.action_inject: "add", loss-free ADDITION — the action
# tokens stay in the sequence for global coordination): project the
# GridActionEncoder's spatially-aligned conv features (already computed at
# latent-grid resolution) and ADD them onto the matching spatial latent
# tokens inside every denoise pass. MuZero-style action-plane injection —
# the canonical scheme for board-shaped actions. The projection is
# zero-initialized: at init the model is exactly the v4.2 model; the direct
# route opens only as far as the gradient pulls it.
#
# MEASUREMENT (probes.py, also fixed): the aggregate whole-frame CF gap has a
# built-in SNR ceiling (~6% of latent cells carry an issued action; a perfect
# +3.7%-local model shows ~+0.0005 aggregate — unreadable at any affordable
# probe size). The console CF-PROBE line and eval_dreamer_dynamics verdicts
# now lead with probe/self_gap_issued / opp_gap_issued — the gap measured
# ONLY at issued-action cells, where a real effect cannot hide.
#
# Kept: junk-action masking (v4.2), tokenizer_v4 latents, 16x cell weighting
# (v4), batch 32 + eval_batches 24 (v4.1), bf16 (v4).
#
#   python src/micro-rts/entrypoints/train_dreamer_dynamics.py \
#       --exp micro-rts/dynamics/dreamerv4/pretrain_dreamerv4_dynamics_v4_3
#
# GATE (pre-registered): probe/self_gap_issued and opp_gap_issued > 0 and
# growing by ~10k steps. Reference points: v4.2@5k measured +0.0085 on
# issued cells (+3.7% of its 0.229 true-MSE there); success looks like this
# ratio climbing toward the tens of percent, and true-MSE at issued cells
# falling toward the other-cell floor (~0.06). If THIS doesn't move it, the
# next question is formulation-level (entity-centric latents a la MAMBA /
# AlphaStar rather than spatial cells) — see the v4 design doc's
# multi-agent roadmap before going there.
# History: docs/micro-rts/DREAMERV4_V4_DESIGN.md + header chain v3 -> v4.3.

run:
  name: pretrain_dreamerv4_dynamics_v4_3
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

trainer:
  type: dreamerv4_dynamics

model:
  type: dreamerv4
  world_lr: 1.0e-4
  actor_lr: 3.0e-5          # unused this phase
  critic_lr: 1.0e-4         # unused this phase
  grad_clip: 10.0
  detach_latents: true
  tokenizer:                # <<< MUST MATCH pretrain_dreamerv4_tokenizer_v4.yaml >>>
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:
    d_model: 512
    depth: 10
    n_heads: 8
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
    opp_dropout: 0.15       # marginal/conditional in one model; fog-of-war hook
    mask_junk_actions: true # v4.2: strip never-executed junk from the self channel
    # v4.3: THE fix — per-cell action features added directly onto the
    # matching spatial latent tokens (zero-init projection; action tokens
    # kept). See header + models/dreamer/world_model.py.
    action_inject: add
    cell_occ_boost: 4.0     # v4 foreground weighting, calibrated levels
    cell_changed_boost: 16.0
    cell_weight_floor: 1.0
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:
    tokenizer: true
    world_model: false
    actor: true
    critic: true

data:
  path: /data/micro-rts/tokdyn_pretrain_v3__*.h5

training:
  amp: true                 # bf16 autocast -> SDPA takes the flash-attention kernel
  steps: 60000
  batch: 32
  seq_len: 16
  num_workers: 8
  reward_coef: 1.0
  cont_coef: 1.0
  flow_coef: 1.0
  flow_self_frac: 0.25          # linear ramp start ...
  flow_self_frac_final: 0.5     # ... to here by the last step (distillation budget)
  warmup_steps: 1000
  lr_min_frac: 0.1
  val_frac: 0.05
  eval_every: 1000
  eval_batches: 24
  rollout_context: 8
  rollout_samples: 4        # best-of-N open-loop samples (residual stochasticity)
  log_every: 100
  save_every: 5000
  out: checkpoints/dreamer_dynamics_v4_3.pt
  tokenizer_ckpt: checkpoints/dreamer_tokenizer_v4.pt

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, pretrain, dynamics, phase2, frozen-tokenizer, v4.3, action-inject-add, junk-action-mask, cell-weighted-loss, tokenizer-v4]
