# DreamerV4 Phase-2 DYNAMICS pretraining, v2 — frozen tokenizer, run-2 lessons applied.
#
# What changed vs pretrain_dreamerv4_dynamics.yaml (run 2, wandb 81hgbb95):
#   * flow_self_frac RAMP 0.25 -> 0.5: run 2's many-step rollouts stayed WORSE
#     than one-step (mse_k16 > mse_k1 at 20k) — the dyadic self-consistency
#     distillation was starved at a constant 4 rows/batch. The ramp keeps early
#     capacity on the empirical flow and shifts budget to distillation late.
#   * Rollout probe upgraded: best-of-N sampling (rollout_samples) because the
#     opponent's actions are unobserved — the future is stochastic and a single
#     sample's latent MSE has an irreducible floor (run 2 never "beat" the
#     copy-last baseline partly for this reason). Adds decoded-obs accuracy vs
#     copy-last (rollout/obs_acc vs rollout/copylast_obs_acc) and a reward-head
#     correlation along generated latents (rollout/reward_corr) as the
#     board-level health signals.
#   * Terminal-frame READINESS: run-2 analysis showed every cont=0 target sits
#     on a masked reset slot (autoreset swallows the terminal arrival frame;
#     verified 204/204 in tokdyn_pretrain_v1), so the continue head AND the
#     terminal win reward are unlearnable from v1 data — wm/continue==0 means
#     "no signal", and the entrypoint now warns about it. The writer/loader
#     support a sparse `terminal_obs` field: once gym-microrts is patched to
#     expose pre-reset observations and a v2 dataset is collected, the loader
#     splices terminal frames in and cont=0 / win-reward supervision turns on
#     with NO change to this config (data.path glob picks the newest store).
#
# ARCH: model blocks are identical to run 2 — the `model.tokenizer` block MUST
# stay byte-for-byte identical to the tokenizer config that produced
# training.tokenizer_ckpt. On v1 data reuse the run-2 checkpoint (no tokenizer
# retrain needed: same data, same arch, latent_scale already stored). After
# collecting a v2 dataset with terminal frames, retrain the tokenizer
# (pretrain_dreamerv4_tokenizer_v2.yaml) and point tokenizer_ckpt at its output.
#
#   python src/micro-rts/entrypoints/train_dreamer_dynamics.py \
#       --exp micro-rts/dynamics/dreamerv4/pretrain_dreamerv4_dynamics_v2
#
# Watch: flow/mse falling (run 2: 1.0 -> ~0.065 by 20k), flow/mse_sigma_hi (the
# hard low-noise regime), rollout/obs_acc climbing toward copylast_obs_acc, the
# mse_k1-vs-k16 ordering flipping as the self-frac ramp bites, and
# rollout/reward_corr rising (run-2 reward head plateaued ~0.17 val loss).

run:
  name: pretrain_dreamerv4_dynamics_v2
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

trainer:
  type: dreamerv4_dynamics

model:
  type: dreamerv4
  world_lr: 1.0e-4
  actor_lr: 3.0e-5          # unused this phase
  critic_lr: 1.0e-4         # unused this phase
  grad_clip: 10.0
  detach_latents: true
  tokenizer:                # <<< MUST MATCH the tokenizer ckpt's config EXACTLY >>>
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:                 # ~47.6M params — unchanged from run 2
    d_model: 512
    depth: 10
    n_heads: 8
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:
    tokenizer: true
    world_model: false
    actor: true
    critic: true

data:
  # Newest match wins: picks up tokdyn_pretrain_v2 (terminal frames) the moment
  # it exists, falls back to v1 until then.
  path: /data/micro-rts/tokdyn_pretrain_v*__*.h5

training:
  steps: 60000
  batch: 16
  seq_len: 16
  num_workers: 8
  reward_coef: 1.0
  cont_coef: 1.0            # only trainable once the store has terminal frames
  flow_coef: 1.0
  flow_self_frac: 0.25          # linear ramp start ...
  flow_self_frac_final: 0.5     # ... to here by the last step (distillation budget)
  warmup_steps: 1000
  lr_min_frac: 0.1
  val_frac: 0.05
  eval_every: 1000
  eval_batches: 8
  rollout_context: 8
  rollout_samples: 4        # best-of-N open-loop samples (opponent stochasticity)
  log_every: 100
  save_every: 5000
  out: checkpoints/dreamer_dynamics_v2.pt
  # Run-2 tokenizer is valid for v1 data (same arch + data; latent_scale stored).
  # After collecting v2 data: retrain via pretrain_dreamerv4_tokenizer_v2 and
  # switch this to checkpoints/dreamer_tokenizer_v2.pt.
  tokenizer_ckpt: checkpoints/dreamer_tokenizer_v2.pt

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, pretrain, dynamics, phase2, frozen-tokenizer, v2]
