# DreamerV4 Phase-2 DYNAMICS pretraining, v3 — joint-action world model on the
# diverse corpus (NEXT_PLAN.md).
#
# Why v3 (diagnosis of the failed hybrid RL run, wandb oqwvpf7g): the v2 WM was
# excellent teacher-forced but generatively useless — expert-only data made the
# action channel carry ~zero information (a_t ≈ π_bot(s_t)) and the opponent was
# an unmodeled latent confounder. Two changes fix identifiability:
#   1. DATA — the v3 corpus records BOTH players' actions (format_version 3) and
#      mixes ε-noised strong play / weak checkpoints / self-play / pure random,
#      so actions are no longer a deterministic function of state.
#   2. MODEL — GridActionEncoder embeds both action channels (separate tables =
#      player-role distinction) with opponent-dropout `opp_dropout` so one model
#      serves the conditional AND the marginal dynamics.
#
# GATES before any RL (eval_dreamer_dynamics.py + the val probe here):
#   * probe/self_gap and probe/opp_gap > 0 and growing with horizon
#     (counterfactual action probe — shuffled actions must hurt),
#   * open-loop MSE beats copy-last by horizon 15 (v2 never did),
#   * reward_corr / mask_acc / continue metrics at v2 levels or better.
#
# ARCH: transformer identical to v2 (~47.6M) + the opponent action tables. The
# `model.tokenizer` block MUST stay byte-for-byte identical to
# pretrain_dreamerv4_tokenizer_v3.yaml's, and training.tokenizer_ckpt points at
# that run's output (its latent_scale rides along in the checkpoint).
#
#   python src/micro-rts/entrypoints/train_dreamer_dynamics.py \
#       --exp micro-rts/dynamics/dreamerv4/pretrain_dreamerv4_dynamics_v3
#
# Watch: the CF-PROBE console lines (self/opp gaps must go positive and grow),
# rollout/mse_k4 dipping below rollout/copylast_mse, flow/mse_sigma_hi, and
# rollout/reward_corr.

run:
  name: pretrain_dreamerv4_dynamics_v3
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

model:
  type: dreamerv4
  world_lr: 1.0e-4
  actor_lr: 3.0e-5          # unused this phase
  critic_lr: 1.0e-4         # unused this phase
  grad_clip: 10.0
  detach_latents: true
  tokenizer:                # <<< MUST MATCH pretrain_dreamerv4_tokenizer_v3.yaml >>>
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:                 # v2 transformer + joint-action conditioning
    d_model: 512
    depth: 10
    n_heads: 8
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
    opp_dropout: 0.15       # marginal/conditional in one model; fog-of-war hook
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:
    tokenizer: true
    world_model: false
    actor: true
    critic: true

data:
  # v3 store only (format_version 3: opponent_action + provenance). Readers
  # hard-error on pre-v3 files rather than training on zero opponent actions.
  path: /data/micro-rts/tokdyn_pretrain_v3__*.h5

training:
  steps: 60000
  batch: 16
  seq_len: 16
  num_workers: 8
  reward_coef: 1.0
  cont_coef: 1.0
  flow_coef: 1.0
  flow_self_frac: 0.25          # linear ramp start ...
  flow_self_frac_final: 0.5     # ... to here by the last step (distillation budget)
  warmup_steps: 1000
  lr_min_frac: 0.1
  val_frac: 0.05
  eval_every: 1000
  eval_batches: 8
  rollout_context: 8
  rollout_samples: 4        # best-of-N open-loop samples (residual stochasticity)
  log_every: 100
  save_every: 5000
  out: checkpoints/dreamer_dynamics_v3.pt
  tokenizer_ckpt: checkpoints/dreamer_tokenizer_v3.pt

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, pretrain, dynamics, phase2, frozen-tokenizer, v3, joint-action]
