# DreamerV4 Phase-2 DYNAMICS pretraining with a FROZEN tokenizer.
#
# Trains the block-causal shortcut-forcing transformer world model on the offline
# rollouts while the phase-1 tokenizer is loaded frozen. Optimizes the arrive-
# aligned reward (symlog two-hot) + continue (BCE) heads and the Dreamer-4 flow
# objective (diffusion forcing + self-consistency); the actor/critic are built but
# never stepped. See `train_dreamer_dynamics.py`.
#
# ARCH CONSISTENCY: `train_dreamer_dynamics` builds the whole model from THIS file's
# `model:` block, then overwrites only `tokenizer.*` with weights from the phase-1
# checkpoint (`training.tokenizer_ckpt`, strict=False). So the `model.tokenizer`
# block below MUST be byte-for-byte identical to pretrain_dreamerv4_tokenizer.yaml's,
# or the frozen tokenizer weights won't load. The `model.dynamics` block is the
# ~47.6M-param ("50M-ish") transformer we're actually training here.
#
# This config is SELF-CONTAINED: the entrypoint reads model arch (`model:`), the
# loop knobs (`training:`, incl. `training.tokenizer_ckpt`), and the dataset
# (`data.path`) all from here. CLI flags are optional OVERRIDES only, so a run is:
#
#   python src/micro-rts/entrypoints/train_dreamer_dynamics.py \
#       --exp micro-rts/dynamics/dreamerv4/pretrain_dreamerv4_dynamics
#
# (Make sure training.tokenizer_ckpt points at the phase-1 output first.) Override
# ad hoc via typed flags or `--set`, e.g. `--set training.batch=32 --no-wandb`.
#
# The ~50M transformer wants a smaller batch than the tokenizer (16 x seq_len 16 =
# 256 frames/step) and more steps. The flow objective runs in unit-RMS latent
# space (normalized by the checkpoint's `latent_scale`), and the reward/continue
# heads read the empirical forcing pass's registers — there is no separate clean
# pass. Watch flow/mse (unweighted x-prediction MSE; should fall steadily, and
# flow/mse_sigma_hi is the hard low-noise regime), flow/consistency (few-step ==
# many-step agreement; ~0 at init is expected — it warms up as the empirical
# flow trains), wm/reward_ema + wm/continue, and above all the rollout/* probe:
# rollout/mse_k* must beat rollout/copylast_mse (else the model is copying the
# last frame, not predicting motion) and rollout/few_vs_many should shrink as
# shortcut distillation kicks in.
#
# Fast CPU sanity check (fresh random frozen tokenizer, 2 steps):
#   python src/micro-rts/entrypoints/train_dreamer_dynamics.py \
#       --exp micro-rts/dynamics/dreamerv4/pretrain_dreamerv4_dynamics --smoke

run:
  name: pretrain_dreamerv4_dynamics
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

model:
  type: dreamerv4
  world_lr: 1.0e-4          # world-model Adam LR (transformer — cooler than the
                            # tokenizer phase; large model, flow objective)
  actor_lr: 3.0e-5          # unused this phase
  critic_lr: 1.0e-4         # unused this phase
  grad_clip: 10.0           # run-1 norms: 1-4 typical with spikes to ~45; clip them
  detach_latents: true
  tokenizer:                # <<< MUST MATCH pretrain_dreamerv4_tokenizer.yaml EXACTLY >>>
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:                 # ~47.6M params ("50M-ish") — the model under study
    d_model: 512
    depth: 10
    n_heads: 8              # 512 / 8 = 64 dims/head
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:                   # tokenizer frozen (loaded from phase 1); actor/critic
    tokenizer: true         # not stepped by this entrypoint regardless
    world_model: false
    actor: true
    critic: true

data:
  # Dataset glob; newest match is used. Override with --data or `--set data.path=...`.
  path: /data/micro-rts/tokdyn_pretrain_v1__*.h5

# The authoritative training-loop config (read by train_dreamer_dynamics.py).
training:
  steps: 60000
  batch: 16
  seq_len: 16
  num_workers: 8
  reward_coef: 1.0
  cont_coef: 1.0
  flow_coef: 1.0
  flow_self_frac: 0.25
  warmup_steps: 1000        # linear LR warmup, then cosine decay to lr_min_frac
  lr_min_frac: 0.1
  val_frac: 0.05            # trajectory-level held-out split (same seed as phase 1)
  eval_every: 1000          # val/* losses + rollout/* open-loop probe cadence
  eval_batches: 8
  rollout_context: 8        # context frames for the open-loop probe (of seq_len 16)
  log_every: 100
  save_every: 5000
  out: checkpoints/dreamer_dynamics.pt
  # Phase-1 tokenizer checkpoint to load frozen. Override with --tokenizer-ckpt.
  tokenizer_ckpt: checkpoints/dreamer_tokenizer.pt

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, pretrain, dynamics, phase2, frozen-tokenizer]
