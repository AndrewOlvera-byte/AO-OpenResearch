# Stable weight-only continuation from the best checkpoint of the initial 160k
# attempt. The old optimizer was clipping increasingly often while its LR was
# still ~1e-5. Load only the 24k best model and train with a fresh low-LR tail.
run:
  name: pretrain_structured_dynamics_v2_causal_paired_action_residual_trust_region_160k_stable_tail
  seed: 0
  device: auto

trainer:
  type: structured_v2_dynamics

model:
  type: structured_v2
  tokenizer:
    d_cell: 128
    d_latent: 128
    downsample: 2
    depth: 2
    n_heads: 4
    max_unit_types: 16
    max_entities: 128
  dynamics:
    d_model: 512
    depth: 8
    n_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    max_action_events: 32
    k_max: 16
    prior_fraction: 0.0
    skip_fraction: 0.0
    initial_noise: zero
    action_encoder_type: factorized
    action_field_dim: 64
    residual_prediction: true
    pretrained_action_router: true
    explicit_spatial_action_routing: true
    mask_empty_entity_tokens: true

data:
  path: /data/micro-rts/wm_v2_pretrain__*.h5

training:
  objective: causal_paired
  amp: true
  steps: 160000
  batch: 64
  seq_len: 1
  num_workers: 8

  # Weight-only initialization deliberately discards the unstable optimizer and
  # scheduler. The checkpoint contains the complete action encoder/router, so it
  # must not be combined with action_tokenizer_ckpt.
  init_from: checkpoints/pretrain_structured_dynamics_v2_causal_paired_action_residual_trust_region_160k/best.pt
  tokenizer_ckpt: checkpoints/structured_tokenizer_v2.pt
  freeze_action_encoder: true
  freeze_action_router: true

  lr: 3.0e-6
  weight_decay: 1.0e-4
  grad_clip: 5.0

  causal_factual_coef: 1.0
  causal_counterfactual_coef: 1.0
  causal_effect_coef: 2.0
  causal_effect_cosine_coef: 0.05
  causal_effect_norm_coef: 0.02
  residual_correction_coef: 0.50
  active_token_boost: 1.0
  changed_token_boost: 2.0
  change_threshold: 1.0e-3
  padding_token_weight: 1.0
  canonical_grounding_coef: 0.0
  canonical_changed_boost: 0.0

  paired_batch_fraction: 0.50
  val_frac: 0.05
  eval_every: 2000
  eval_batches: 64
  fixed_val: true
  fixed_val_seed: 0
  probe_flow_steps: 1
  probe_samples: 256

  # One smooth tail. There are no restarts capable of kicking the residual away
  # from a good basin later in the run.
  warmup_steps: 500
  lr_stages:
    - {end_step: 160000, start_frac: 1.0, end_frac: 0.03}
  lr_min_frac: 0.03
  log_every: 100
  average_train_metrics: true

  out: checkpoints/structured_dynamics_v2_causal_paired_action_residual_trust_region_160k_stable_tail.pt
  checkpoint:
    every_steps: 5000
    keep_last: 5
    monitor: val/causal/unweighted_mse
    mode: min
    resume: false
    resume_from: latest

wandb:
  project: ao-openresearch
  entity: null
  run_name: pretrain_structured_dynamics_v2_causal_paired_action_residual_trust_region_160k_stable_tail
  tags: [micro-rts, structured-v2, causal-paired, deterministic, residual,
         trust-region, frozen-router, full-padding, stable-tail, weight-only-init,
         batch-64, bf16, flash-sdpa]
