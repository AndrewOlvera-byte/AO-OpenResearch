# Continuation of causal-paired v2 from its best validation checkpoint.
# Keep the 50M architecture and objective fixed; use a lower-LR tail to test
# whether intervention geometry is still improving rather than changing the
# representation or adding flow/bootstrap losses prematurely.
run:
  name: pretrain_structured_dynamics_v2_causal_paired_v3
  seed: 0
  device: auto

model:
  type: structured_v2
  tokenizer:
    d_cell: 128
    d_latent: 128
    downsample: 2
    depth: 2
    n_heads: 4
    max_unit_types: 16
    max_entities: 128
  dynamics:
    d_model: 512
    depth: 8
    n_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    max_action_events: 32
    k_max: 16
    prior_fraction: 0.0
    skip_fraction: 0.0
    initial_noise: zero

data:
  path: /data/micro-rts/wm_v2_pretrain__*.h5

training:
  objective: causal_paired
  amp: true
  init_from: checkpoints/pretrain_structured_dynamics_v2_causal_paired_v2/best.pt
  steps: 60000
  batch: 32
  seq_len: 1
  num_workers: 8
  lr: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip: 5.0
  causal_factual_coef: 1.0
  causal_counterfactual_coef: 1.0
  causal_effect_coef: 4.0
  active_token_boost: 1.0
  changed_token_boost: 8.0
  change_threshold: 1.0e-3
  padding_token_weight: 0.05
  val_frac: 0.05
  eval_every: 500
  eval_batches: 32
  fixed_val: true
  fixed_val_seed: 0
  probe_flow_steps: 1
  probe_samples: 128
  save_every: 2500
  warmup_steps: 500
  lr_min_frac: 0.25
  log_every: 100
  average_train_metrics: true
  tokenizer_ckpt: checkpoints/structured_tokenizer_v2.pt
  out: checkpoints/structured_dynamics_v2_causal_paired_v3.pt
  checkpoint:
    every_steps: 2500
    keep_last: 3
    monitor: val/wm/total
    mode: min
    resume: false
    resume_from: latest

wandb:
  project: ao-openresearch
  entity: null
  run_name: pretrain_structured_dynamics_v2_causal_paired_v3
  tags: [micro-rts, structured-v2, causal-paired, deterministic, continuation,
         v3, from-v2-best, 50m]
