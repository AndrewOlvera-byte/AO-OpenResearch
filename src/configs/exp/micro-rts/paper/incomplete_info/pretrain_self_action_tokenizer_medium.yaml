run: {name: pretrain_incomplete_self_action_tokenizer_medium, seed: 0, device: auto}
model:
  self_action_tokenizer: {d_model: 512, d_latent: 320, field_dim: 64, n_heads: 8, max_action_events: 48}
data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
training:
  full_state_tokenizer_ckpt: checkpoints/pretrain_medium_jepa_exact/best.pt
  init_action_tokenizer_ckpt: checkpoints/pretrain_action_encoder_medium_jepa_exact/best.pt
  steps: 60000
  batch: 32
  num_workers: 8
  lr: 2.0e-4
  loss: {reconstruction: 1.0, forward: 1.0, changed_token_boost: 8.0}
  val_frac: 0.05
  eval_every: 1000
  checkpoint_every: 5000
  log_every: 100
  out: checkpoints/pretrain_incomplete_self_action_tokenizer_medium/model.pt
wandb: {project: ao-openresearch, tags: [micro-rts, incomplete-info, medium, self-action]}
