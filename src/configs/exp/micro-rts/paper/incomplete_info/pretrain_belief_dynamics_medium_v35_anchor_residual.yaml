run:
  name: pretrain_belief_dynamics_medium_v35_anchor_residual
  seed: 0
  device: auto

model:
  belief_dynamics:
    d_model: 512
    depth: 4
    n_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    sample_steps: 4
    current_belief_anchor: true
    axial_state_position: true
    direct_action_attention: true

data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
  # Every optimization batch contains genuine cloned-engine interventions.
  paired_batch_fraction: 1.0

training:
  # Deliberately no init_from: new history-conditioned anchor and transition
  # flow start together from random weights. Promoted tokenizers and the v3
  # intent prior remain frozen to isolate the dynamics failure.
  trainable_scope: flow
  intent_prior_ckpt: checkpoints/pretrain_opponent_intent_prior_medium_v3/model.pt
  mechanics_stats_ckpt: checkpoints/pretrain_flow_dynamics_medium_jepa_exact_overshoot_200k/best.pt
  seq_len: 64
  steps: 80000
  batch: 2
  num_workers: 6
  lr: 3.0e-5
  warmup_steps: 1000
  lr_min_frac: 0.1
  grad_clip: 5.0

  loss:
    # Preserve genuine random-time conditional flow matching. The endpoint is
    # auxiliary rather than a second equally strong regression objective.
    flow: 1.0
    prior: 0.2
    grounding: 0.001
    anchor: 1.0
    anchor_grounding: 0.001
    # These were already validated in v2; omitting their extra swapped forwards
    # keeps this run focused on anchor and causal transition fitting.
    history_rank: 0.0
    intent_rank: 0.0
    # Cross-episode action swaps are invalid interventions and stay disabled.
    action_rank: 0.0
    action_residual: 0.0
    # Same departure and opponent action, cloned legal ego intervention.
    counterfactual: 1.0
    counterfactual_effect: 1.0

  condition_margin: 0.02
  rank_anchors: 4
  visible_boost: 0.5
  occupied_boost: 2.0
  hidden_occupied_boost: 4.0
  val_frac: 0.05
  eval_seed: 1729
  eval_every: 500
  eval_batches: 32
  checkpoint_every: 2500
  log_every: 25
  monitor: belief_dynamics/total
  log_metrics:
    - belief_dynamics/total
    - belief_dynamics/flow
    - belief_dynamics/prior_latent
    - belief_dynamics/prior_grounding
    - belief_dynamics/current_anchor
    - belief_dynamics/current_anchor_grounding
    - belief_dynamics/transition_target_rms
    - belief_dynamics/counterfactual
    - belief_dynamics/counterfactual_effect
    - belief_dynamics/counterfactual_effect_cosine
    - belief_dynamics/counterfactual_effect_norm_ratio
    - belief_dynamics/counterfactual_effect_active
    - belief_dynamics/history_rank
    - belief_dynamics/intent_rank
    - belief_dynamics/history_advantage
    - belief_dynamics/intent_advantage
    - belief_dynamics/visible_exact_cell
    - belief_dynamics/hidden_exact_cell
    - belief_dynamics/hidden_occupied_exact
    - belief_dynamics/exact_globals
    - belief_dynamics/tok/exact_occupied_cell
    - belief_dynamics/tok/mechanics_score
  out: checkpoints/pretrain_belief_dynamics_medium_v35_anchor_residual/model.pt

wandb:
  project: ao-openresearch
  run_name: pretrain_belief_dynamics_medium_v35_anchor_residual
  tags: [micro-rts, incomplete-info, belief-dynamics-v35, from-scratch-flow,
         current-belief-anchor, residual-flow, paired-counterfactual,
         axial-position, direct-action-attention, planner-objective]
