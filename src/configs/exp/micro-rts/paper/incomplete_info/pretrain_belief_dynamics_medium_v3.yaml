run: {name: pretrain_belief_dynamics_medium_v3, seed: 0, device: auto}
model:
  belief_dynamics:
    d_model: 512
    depth: 4
    n_heads: 8
    sample_steps: 1
    explicit_action_residual: true
data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
training:
  # Preserve the promoted v2 belief/history/intent solution. Only the new,
  # zero-initialized explicit action route is trainable in this experiment.
  init_from: checkpoints/pretrain_belief_dynamics_medium_v2/best.pt
  trainable_scope: action_residual
  intent_prior_ckpt: checkpoints/pretrain_opponent_intent_prior_medium_v3/model.pt
  mechanics_stats_ckpt: checkpoints/pretrain_flow_dynamics_medium_jepa_exact_overshoot_200k/best.pt
  seq_len: 64
  steps: 10000
  batch: 2
  num_workers: 8
  lr: 2.0e-4
  warmup_steps: 250
  lr_min_frac: 0.05
  grad_clip: 5.0
  loss:
    flow: 1.0
    prior: 1.0
    grounding: 0.1
    history_rank: 0.0
    intent_rank: 0.0
    action_rank: 20.0
    action_residual: 0.05
  condition_margin: 0.02
  rank_anchors: 8
  visible_boost: 1.0
  occupied_boost: 4.0
  hidden_occupied_boost: 8.0
  val_frac: 0.05
  eval_seed: 1729
  eval_every: 500
  eval_batches: 32
  checkpoint_every: 1000
  log_every: 50
  monitor: belief_dynamics/total
  log_metrics:
    - belief_dynamics/total
    - belief_dynamics/flow
    - belief_dynamics/prior_latent
    - belief_dynamics/prior_grounding
    - belief_dynamics/action_rank
    - belief_dynamics/action_advantage
    - belief_dynamics/action_output_delta
    - belief_dynamics/action_residual_penalty
    - belief_dynamics/history_advantage
    - belief_dynamics/intent_advantage
    - belief_dynamics/visible_exact_cell
    - belief_dynamics/hidden_exact_cell
    - belief_dynamics/hidden_occupied_exact
    - belief_dynamics/exact_globals
    - belief_dynamics/tok/exact_occupied_cell
    - belief_dynamics/tok/mechanics_score
  out: checkpoints/pretrain_belief_dynamics_medium_v3/model.pt
wandb:
  project: ao-openresearch
  run_name: pretrain_belief_dynamics_medium_v3
  tags: [micro-rts, incomplete-info, belief-dynamics-v3, v2-best-init, frozen-belief, explicit-action-residual, trust-region]
