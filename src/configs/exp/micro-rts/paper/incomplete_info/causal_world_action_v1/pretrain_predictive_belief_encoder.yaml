run:
  name: pretrain_causal_world_action_encoder_v1
  seed: 0
  device: auto

trainer:
  type: causal_world_action_encoder

model:
  type: causal_world_action_encoder
  predictive_belief:
    d_model: 512
    d_latent: 320
    n_heads: 8
    frame_depth: 2
    temporal_depth: 4
    mixer_depth: 2
    predictor_depth: 2
    mlp_ratio: 4.0
    dropout: 0.0
    n_self_tokens: 8
    n_opponent_tokens: 8
    n_static_tokens: 4
    n_interaction_tokens: 8
    context_length: 64
    horizons: [1, 2, 4, 8, 16]
    ema_decay: 0.996
    discount: 0.997
    event_dim: 8

data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
  paired_batch_fraction: 1.0
  h5_cache_mb: 256

training:
  source_intent_ckpt: checkpoints/pretrain_opponent_intent_prior_medium_v3/model.pt
  seq_len: 64
  steps: 100000
  # Measured on the 16 GiB RTX 5070 Ti: batch 4 used only ~5.5 GiB.  Twelve
  # keeps SDPA/tensor cores saturated while retaining an OOM safety margin.
  batch: 12
  num_workers: 8
  prefetch_factor: 3
  persistent_workers: true
  pin_memory: true
  amp: true
  lr: 2.0e-4
  warmup_steps: 2000
  lr_min_frac: 0.05
  weight_decay: 1.0e-4
  adam_eps: 1.0e-5
  grad_clip: 5.0
  loss:
    type: predictive_belief
    weights:
      future_jepa: 1.0
      variance: 0.05
      self_inverse: 0.5
      opponent_plan: 0.5
      events: 0.5
      reward: 0.5
      return: 0.5
      continue: 0.1
      counterfactual: 1.0
      counterfactual_effect: 1.0
  val_frac: 0.05
  eval_seed: 1729
  eval_every: 1000
  eval_batches: 16
  checkpoint_every: 2500
  log_every: 25
  monitor: world_action_encoder/total
  log_metrics:
    - world_action_encoder/total
    - world_action_encoder/future_jepa
    - world_action_encoder/variance
    - world_action_encoder/self_inverse
    - world_action_encoder/opponent_plan
    - world_action_encoder/events
    - world_action_encoder/reward
    - world_action_encoder/return
    - world_action_encoder/continue
    - world_action_encoder/counterfactual
    - world_action_encoder/counterfactual_effect
    - world_action_encoder/counterfactual_effect_cosine
    - world_action_encoder/latent_rms
  out: checkpoints/pretrain_causal_world_action_encoder_v1/model.pt

wandb:
  project: ao-openresearch
  run_name: pretrain_causal_world_action_encoder_v1
  tags: [micro-rts, incomplete-info, causal-world-action-v1, predictive-belief,
         factorized-latent, future-jepa, inverse-action, counterfactual,
         reward-aware, bf16, flash-sdpa]
