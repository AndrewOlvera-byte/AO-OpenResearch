run: {name: pretrain_opponent_intent_prior_medium_v2, seed: 0, device: auto}
model:
  ego_tokenizer: {d_model: 320, d_latent: 320, depth: 4, n_heads: 8, downsample: 2, n_registers: 8}
  self_action_tokenizer: {d_model: 512, d_latent: 320, field_dim: 64, n_heads: 8, max_action_events: 48}
  opponent_tokenizer: {d_model: 512, d_latent: 320, field_dim: 64, n_heads: 8, depth: 3, max_action_events: 48, n_plan_tokens: 8, horizons: [0, 1, 2, 4, 8, 16]}
  history: {d_model: 512, depth: 4, n_heads: 8, n_registers: 24, context_length: 64, time_every: 1}
  intent_prior: {d_model: 512, depth: 3, n_heads: 8, n_modes: 8, contrast_dim: 128}
data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
training:
  full_state_tokenizer_ckpt: checkpoints/pretrain_medium_jepa_exact/best.pt
  ego_tokenizer_ckpt: checkpoints/pretrain_incomplete_ego_tokenizer_medium/best.pt
  self_action_tokenizer_ckpt: checkpoints/pretrain_incomplete_self_action_tokenizer_medium/best.pt
  opponent_tokenizer_ckpt: checkpoints/pretrain_opponent_plan_tokenizer_medium/best.pt
  seq_len: 64
  steps: 100000
  batch: 2
  num_workers: 8
  lr: 1.0e-4
  warmup_steps: 2000
  stats_batches: 32
  loss: {latent: 1.0, event: 1.0, mode: 0.25, contrastive: 0.5, shuffled_margin: 0.5, diversity: 0.05}
  shuffled_history_margin: 0.25
  diversity_floor: 0.75
  contrastive_temperature: 0.1
  val_frac: 0.05
  eval_every: 500
  eval_batches: 8
  checkpoint_every: 5000
  log_every: 50
  monitor: intent/top1_event
  log_metrics:
    - intent/total
    - intent/latent
    - intent/event
    - intent/top1_event
    - intent/mode_ce
    - intent/contrastive
    - intent/shuffled_rank
    - intent/diversity_rms
    - intent/mode_entropy
    - intent/active_modes
    - intent_top1/valid_acc
    - intent_top1/action_type_acc
  out: checkpoints/pretrain_opponent_intent_prior_medium_v2/model.pt
wandb:
  project: ao-openresearch
  run_name: pretrain_opponent_intent_prior_medium_v2
  tags: [micro-rts, incomplete-info, medium, opponent-intent, multimodal-prior, history-conditioned]
