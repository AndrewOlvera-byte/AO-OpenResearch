run: {name: probe_incomplete_self_action_tokenizer, seed: 0, device: auto}
trainer:
  type: incomplete_self_action_tokenizer

model:
  self_action_tokenizer: {d_model: 128, d_latent: 320, field_dim: 32, n_heads: 8, max_action_events: 48}
data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
training:
  full_state_tokenizer_ckpt: checkpoints/pretrain_medium_jepa_exact/best.pt
  steps: 10000
  batch: 32
  num_workers: 8
  lr: 3.0e-4
  loss: {reconstruction: 1.0, forward: 1.0, changed_token_boost: 8.0}
  val_frac: 0.02
  eval_every: 500
  checkpoint_every: 1000
  log_every: 50
  out: checkpoints/probe_incomplete_self_action_tokenizer/model.pt
wandb: {project: ao-openresearch, tags: [micro-rts, incomplete-info, probe, self-action]}
