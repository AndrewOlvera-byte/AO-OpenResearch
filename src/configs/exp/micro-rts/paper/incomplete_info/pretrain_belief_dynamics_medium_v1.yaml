run: {name: pretrain_belief_dynamics_medium_v1, seed: 0, device: auto}
trainer:
  type: belief_dynamics

model:
  belief_dynamics: {d_model: 512, depth: 4, n_heads: 8, sample_steps: 4}
data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944__fog_v1.h5
  observation_mode: ego
training:
  intent_prior_ckpt: checkpoints/pretrain_opponent_intent_prior_medium_v3/model.pt
  mechanics_stats_ckpt: checkpoints/pretrain_flow_dynamics_medium_jepa_exact_overshoot_200k/best.pt
  seq_len: 64
  steps: 150000
  batch: 2
  num_workers: 8
  lr: 1.0e-4
  warmup_steps: 3000
  lr_min_frac: 0.05
  grad_clip: 5.0
  loss: {flow: 1.0, prior: 1.0, grounding: 0.25, history_rank: 1.0, intent_rank: 1.0}
  condition_margin: 0.05
  visible_boost: 3.0
  val_frac: 0.05
  eval_every: 500
  eval_batches: 8
  checkpoint_every: 5000
  log_every: 50
  monitor: belief_dynamics/prior_grounding
  log_metrics:
    - belief_dynamics/total
    - belief_dynamics/flow
    - belief_dynamics/prior_latent
    - belief_dynamics/prior_grounding
    - belief_dynamics/history_advantage
    - belief_dynamics/intent_advantage
    - belief_dynamics/visible_exact_cell
    - belief_dynamics/hidden_exact_cell
    - belief_dynamics/hidden_occupied_exact
    - belief_dynamics/exact_globals
    - belief_dynamics/tok/exact_occupied_cell
    - belief_dynamics/tok/mechanics_score
  out: checkpoints/pretrain_belief_dynamics_medium_v1/model.pt
wandb:
  project: ao-openresearch
  run_name: pretrain_belief_dynamics_medium_v1
  tags: [micro-rts, incomplete-info, medium, belief-dynamics, promoted-intent-v3, state-only-flow, pure-prior, condition-ranking]
