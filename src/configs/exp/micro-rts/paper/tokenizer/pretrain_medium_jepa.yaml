run:
  name: pretrain_medium_jepa
  seed: 0
  device: auto

# Reconstruction-anchored, action-conditioned temporal JEPA treatment. The
# deployed checkpoint contains only the online structured tokenizer; the EMA
# target and transition predictor are disposable pretraining scaffolding.
trainer:
  type: structured_v2_tokenizer

model:
  type: structured_v2
  tokenizer:
    d_cell: 320
    d_latent: 320
    downsample: 2
    depth: 4
    n_heads: 8
    dropout: 0.0
    max_unit_types: 16
    max_entities: 128
  temporal_jepa:
    d_model: 512
    field_dim: 64
    n_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    max_action_events: 32
    max_unit_types: 16
    ema_decay: 0.996
    ema_end_decay: 1.0

data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944.h5

training:
  objective: temporal_jepa
  amp: true
  steps: 100000
  batch: 32
  seq_len: 1
  num_workers: 8
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 10.0

  reconstruction_coef: 1.0
  jepa_factual_coef: 1.0
  jepa_counterfactual_coef: 1.0
  jepa_effect_coef: 2.0
  changed_token_boost: 8.0
  change_threshold: 1.0e-3
  padding_token_weight: 0.05
  paired_batch_fraction: 0.50

  val_frac: 0.05
  fixed_val: true
  fixed_val_seed: 0
  eval_every: 1000
  eval_batches: 16
  warmup_steps: 1000
  lr_min_frac: 0.05
  log_every: 100
  stats_batches: 32
  out: checkpoints/pretrain_medium_jepa.pt
  checkpoint:
    every_steps: 5000
    keep_last: 3
    monitor: val/tok/total
    mode: min
    resume: false
    resume_from: latest

wandb:
  project: ao-openresearch
  entity: null
  run_name: pretrain_medium_jepa
  tags: [micro-rts, paper, tokenizer, structured-v2, medium, temporal-jepa,
         causal-paired, ema-target]
