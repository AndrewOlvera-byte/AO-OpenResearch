run:
  name: pretrain_medium_recon
  seed: 0
  device: auto

# Architecture-matched observation-tokenizer control for the paper matrix.
# At 320-wide/depth-4 this is 7.18M parameters versus 0.78M for structured-v2.
trainer:
  type: structured_v2_tokenizer

model:
  type: structured_v2
  tokenizer:
    d_cell: 320
    d_latent: 320
    downsample: 2
    depth: 4
    n_heads: 8
    dropout: 0.0
    max_unit_types: 16
    max_entities: 128

data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944.h5

training:
  objective: reconstruction
  amp: true
  steps: 100000
  batch: 32
  seq_len: 1
  num_workers: 8
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 10.0

  # Match the JEPA arm's storage-local state distribution exactly. The extra
  # transition fields are loaded but ignored by the reconstruction objective.
  paired_batch_fraction: 0.50
  val_frac: 0.05
  fixed_val: true
  fixed_val_seed: 0
  eval_every: 1000
  eval_batches: 16
  warmup_steps: 1000
  lr_min_frac: 0.05
  log_every: 100
  stats_batches: 32
  out: checkpoints/pretrain_medium_recon.pt
  checkpoint:
    every_steps: 5000
    keep_last: 3
    monitor: val/tok/total
    mode: min
    resume: false
    resume_from: latest

wandb:
  project: ao-openresearch
  entity: null
  run_name: pretrain_medium_recon
  tags: [micro-rts, paper, tokenizer, structured-v2, medium, reconstruction]
