run:
  name: pretrain_action_encoder_medium_jepa
  seed: 0
  device: auto

# Identical action-JEPA/router warmup to the reconstruction arm. Only the frozen
# observation-tokenizer checkpoint differs.
model:
  type: structured_action_tokenizer_v2
  action_tokenizer:
    d_model: 512
    field_dim: 64
    n_heads: 8
    inverse_depth: 2
    mlp_ratio: 4.0
    dropout: 0.0
    max_action_events: 32
    max_unit_types: 16

data:
  path: /data/micro-rts/wm_v2_pretrain__20260713-030227__5a273944.h5

training:
  amp: true
  steps: 100000
  batch: 32
  num_workers: 8
  lr: 2.0e-4
  weight_decay: 1.0e-4
  grad_clip: 5.0
  reconstruction_coef: 1.0
  inverse_coef: 1.0
  forward_coef: 1.0
  paired_effect_coef: 4.0
  alignment_coef: 0.1
  changed_token_boost: 8.0
  change_threshold: 1.0e-3
  padding_token_weight: 0.05
  paired_batch_fraction: 0.50
  val_frac: 0.05
  eval_every: 1000
  eval_batches: 32
  fixed_val: true
  fixed_val_seed: 0
  warmup_steps: 1000
  lr_min_frac: 0.05
  log_every: 100
  tokenizer_ckpt: checkpoints/pretrain_medium_jepa.pt
  out: checkpoints/pretrain_action_encoder_medium_jepa.pt
  checkpoint:
    every_steps: 5000
    keep_last: 3
    monitor: val/action_tok/total
    mode: min
    resume: false
    resume_from: latest

wandb:
  project: ao-openresearch
  entity: null
  run_name: pretrain_action_encoder_medium_jepa
  tags: [micro-rts, paper, structured-v2, medium, action-jepa, temporal-jepa-tokenizer]
