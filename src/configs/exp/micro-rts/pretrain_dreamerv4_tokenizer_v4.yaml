# DreamerV4 Phase-1 TOKENIZER pretraining, v4 — sharpened objective, same v3
# corpus, same architecture.
#
# WHY (and why NOT a new autoencoder): the latent-delta probe on the v3
# tokenizer shows the latent geometry is already discriminative — in the
# unit-RMS space the dynamics model sees, changed cells move the latent by
# 0.62 RMS vs 0.026 for unchanged cells (24x separation), and occupied-cell
# recon accuracy is 97-99%. So the spatial continuous-latent design stays
# (the shortcut-forcing flow needs continuous latents; VQ/discrete is not a
# fit). What the v3 MSE objective does NOT do is (a) treat the one-hot
# channel groups as the categorical distributions they are, or (b) push
# encoder capacity toward the rare dynamic cells the dynamics model must
# predict. v4 adds both, following what works in grid-game world models
# (IRIS trains with categorical CE; Delta-IRIS focuses its autoencoder on
# inter-frame deltas):
#   * group_ce_coef — per-group cross-entropy over hp/resources/owner/
#     unit_type/action (proper likelihood; real gradient on rare classes),
#     alongside the MSE which anchors the tanh-latent scale with latent_noise.
#   * cell_* boosts — occupied 4x / changed 16x recon weighting at the raw
#     grid (mean-normalized; same scheme as the dynamics-v4 flow loss).
#
# The `model:` block is byte-identical to v3 — a drop-in ablation. The
# dynamics phase that consumes this must set training.tokenizer_ckpt to this
# run's output AND keep its model.tokenizer block identical to this file's.
#
#   python src/micro-rts/entrypoints/train_dreamer_tokenizer.py \
#       --exp micro-rts/pretrain_dreamerv4_tokenizer_v4
#
# GATE: eval_dreamer_tokenizer.py occupied-cell accuracy at or above the v3
# numbers (hp .986 / owner .992 / unit_type .973 / action .977), and rerun
# the latent-delta probe — changed-cell delta RMS should hold or rise vs
# v3's 0.62 (bigger action-caused latent motion = easier flow target).

run:
  name: pretrain_dreamerv4_tokenizer_v4
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

model:
  type: dreamerv4
  world_lr: 3.0e-4          # tokenizer-only Adam LR
  actor_lr: 3.0e-5          # unused this phase
  critic_lr: 1.0e-4         # unused this phase
  grad_clip: 10.0
  detach_latents: true
  tokenizer:                # <<< MUST MATCH the consuming dynamics config >>>
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:                 # built but never stepped here; sized to match dynamics
    d_model: 512
    depth: 10
    n_heads: 8
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
    opp_dropout: 0.15
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:
    tokenizer: false
    world_model: true
    actor: true
    critic: true

data:
  # Same v3 store — the corpus was validated solid; v4 changes the objective only.
  path: /data/micro-rts/tokdyn_pretrain_v3__*.h5

training:
  amp: true                 # bf16 autocast -> SDPA takes the flash-attention kernel
  steps: 25000
  batch: 64
  seq_len: 16
  num_workers: 8
  recon_coef: 1.0
  mask_coef: 1.0
  latent_noise: 0.1         # decoder robustness + latent-scale anchor (v2 win)
  # v4 objective sharpeners (see loss.dreamer.tokenizer_loss):
  group_ce_coef: 0.3        # per-group categorical CE; MSE stays the scale anchor
  cell_occ_boost: 4.0       # occupied cells 4x in the recon terms
  cell_changed_boost: 16.0  # changed-vs-prev-frame cells 16x (maxed, not summed)
  cell_weight_floor: 1.0
  warmup_steps: 500
  lr_min_frac: 0.1
  val_frac: 0.05
  eval_every: 2000
  eval_batches: 8
  log_every: 100
  save_every: 5000
  out: checkpoints/dreamer_tokenizer_v4.pt

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, pretrain, tokenizer, phase1, v4, group-ce, cell-weighted]
