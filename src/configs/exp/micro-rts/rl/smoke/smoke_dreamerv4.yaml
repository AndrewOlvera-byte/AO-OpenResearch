# DreamerV4 SMOKE / dynamics-analysis config — tiny model, fast iterations.
#
# Purpose: verify the model-based training dynamics before committing GPU-days —
# every iteration logs the world-model health metrics (`analyze_every: 1`):
#   dyn/openloop_mse  — teacher-forced generation error in latent space; compare
#                       against dyn/copylast_mse (a static world model ~= copylast)
#   dyn/reward_corr   — clean-pass reward head vs env reward (should climb to >0.5)
#   dyn/mask_acc      — predicted action-mask accuracy on GENERATED latents (what
#                       imagination actually uses for masking)
#   dyn/z_motion      — mean |dz| per imagined step (0 => frozen imagination)
# plus the loss suite: wm/recon, wm/mask_bce, wm/reward, wm/continue,
# flow/matching, flow/consistency, ac/*.
#
# Run:  python src/micro-rts/entrypoints/train_dreamer_rl.py --exp micro-rts/rl/smoke/smoke_dreamerv4 --no-wandb
# Test: add --test for the single-shot smoke (collect + one update of each group).

run:
  name: smoke_dreamerv4
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

model:
  type: dreamerv4
  world_lr: 3.0e-4          # tiny model — slightly hotter for a fast smoke signal
  actor_lr: 3.0e-5
  critic_lr: 1.0e-4
  grad_clip: 1000.0
  detach_latents: true
  tokenizer:
    enc_channels: 32
    d_latent: 16
    tanh_bottleneck: true
  dynamics:
    d_model: 128
    depth: 3
    n_heads: 4
    n_register: 2
    time_every: 2
    k_max: 8
    reward_bins: 255
    action_emb: 16
    action_channels: 32
  actor_critic:
    dec_channels: 32
    critic_hidden: [128]
    imagine_horizon: 8
    imagine_context: 4
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
  freeze:                   # flip these for pretrain-then-RL experiments
    tokenizer: false
    world_model: false
    actor: false
    critic: false

data: {}

training:
  iters: 100
  dreamer:
    num_envs: 8
    horizon: 32
    seq_len: 8
    batch_seqs: 8
    buffer_capacity: 512
    warmup_steps: 64
    wm_updates: 2
    imagine_horizon: 8
    use_flow: true
    flow_coef: 1.0
    flow_self_frac: 0.25
    analyze_every: 1        # dynamics report every iteration — this IS the smoke
    bots: [randomBiasedAI]
    map_path: maps/16x16/basesWorkers16x16.xml
    max_steps: 500
    reward: dense_shaped
  console:
    every_iters: 1
  eval:
    enabled: false
  checkpoint:
    every_iters: 1000000    # effectively off for the smoke

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, smoke, dynamics-analysis]
