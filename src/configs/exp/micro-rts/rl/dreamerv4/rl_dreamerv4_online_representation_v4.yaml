# Real-transition control baseline over the frozen v4 representation. No imagined
# reward or dynamics gradient reaches the actor. If this learns while hybrid does
# not, dynamics are the bottleneck; if it is also flat, test a /2 tokenizer next.
run:
  name: rl_dreamerv4_online_representation_v4
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

trainer:
  type: dreamerv4

model:
  type: dreamerv4
  world_lr: 3.0e-5
  actor_lr: 3.0e-5
  critic_lr: 1.0e-4
  grad_clip: 10.0
  detach_latents: true
  tokenizer:
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:
    d_model: 512
    depth: 10
    n_heads: 8
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
    opp_dropout: 0.05
    mask_junk_actions: true
    action_inject: add
    opp_head: true
    opp_head_channels: 64
    cell_occ_boost: 4.0
    cell_changed_boost: 16.0
    cell_weight_floor: 1.0
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:
    tokenizer: true
    world_model: true
    actor: false
    critic: false

data: {}

training:
  iters: 5000
  dreamer:
    mode: online
    init_from: checkpoints/dreamer_dynamics_v4_4.pt
    amp: true
    buffer_device: cpu
    num_envs: 32
    horizon: 64
    seq_len: 16
    batch_seqs: 16
    buffer_capacity: 2048
    warmup_steps: 1024
    train_ratio: 0.5
    analyze_every: 0
    bots: [randomBiasedAI, workerRushAI]
    map_path: maps/16x16/basesWorkers16x16.xml
    max_steps: 2000
    reward: dense_shaped
    league:
      enabled: true
      bot_steps: 1000000
      mix_bot_block: 500000
      mix_selfplay_block: 500000
      snapshot_every: 200000
      pool_capacity: 8
      recency_bias: 2.0
  console:
    every_iters: 10
  eval:
    enabled: true
    every_iters: 50
    games: 5
    envs_per_bot: 4
    max_steps: 2000
    bots: [randomBiasedAI, workerRushAI, coacAI]
    greedy: true
  checkpoint:
    every_iters: 100
    keep_last: 3
    monitor: eval/win_rate
    mode: max

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, rl, online, representation-baseline, frozen-tokenizer]
