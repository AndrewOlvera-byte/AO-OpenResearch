# DreamerV4 Phase-1 TOKENIZER pretraining, v2 — for the terminal-frame dataset.
#
# ONLY needed once a tokdyn_pretrain_v2 store (collected with terminal_obs, i.e.
# the patched gym-microrts jar that exposes pre-reset observations) exists:
# terminal boards are states the run-2 tokenizer never saw, and they become both
# flow targets and the arrival frames the continue / win-reward heads read, so
# the autoencoder must reconstruct them. Until then, DO NOT retrain — the run-2
# checkpoint (checkpoints/dreamer_tokenizer.pt, latent_scale 0.531) is exactly
# right for v1 data.
#
# Identical to pretrain_dreamerv4_tokenizer.yaml except data glob / output path /
# run name; the `model.tokenizer` block MUST stay byte-for-byte identical to
# pretrain_dreamerv4_dynamics_v2.yaml's (frozen-weight load contract).
#
#   python src/micro-rts/entrypoints/train_dreamer_tokenizer.py \
#       --exp micro-rts/pretrain_dreamerv4_tokenizer_v2

run:
  name: pretrain_dreamerv4_tokenizer_v2
  seed: 0
  device: auto
  ckpt_dir: checkpoints
  verbose: true

model:
  type: dreamerv4
  world_lr: 3.0e-4          # tokenizer-only Adam LR
  actor_lr: 3.0e-5          # unused this phase
  critic_lr: 1.0e-4         # unused this phase
  grad_clip: 10.0
  detach_latents: true
  tokenizer:                # <<< MUST MATCH pretrain_dreamerv4_dynamics_v2.yaml >>>
    enc_channels: 96
    d_latent: 32
    tanh_bottleneck: true
  dynamics:                 # built but never stepped here; sized to match v2 dynamics
    d_model: 512
    depth: 10
    n_heads: 8
    n_register: 4
    time_every: 2
    k_max: 16
    reward_bins: 255
    action_emb: 32
    action_channels: 64
  actor_critic:
    dec_channels: 64
    critic_hidden: [256]
    imagine_horizon: 15
    imagine_context: 8
    imagine_flow_steps: 4
    gamma: 0.99
    lam: 0.95
    entropy_coef: 3.0e-3
    critic_ema: 0.98
    critic_bins: 255
    return_norm: true
    return_norm_rate: 0.01
    return_norm_limit: 1.0
  freeze:
    tokenizer: false
    world_model: true
    actor: true
    critic: true

data:
  # v2 store only — this config exists to consume terminal-frame data; if the
  # glob matches nothing, collect first (or use the v1 tokenizer checkpoint).
  path: /data/micro-rts/tokdyn_pretrain_v2__*.h5

training:
  steps: 25000
  batch: 64
  seq_len: 16
  num_workers: 8
  recon_coef: 1.0
  mask_coef: 1.0
  latent_noise: 0.1         # decoder robustness + latent-scale anchor (run-2 win:
                            # |z| held ~0.45 instead of collapsing to 0.12)
  warmup_steps: 500
  lr_min_frac: 0.1
  val_frac: 0.05
  eval_every: 2000
  eval_batches: 8
  log_every: 100
  save_every: 5000
  out: checkpoints/dreamer_tokenizer_v2.pt

wandb:
  run_name: ${run.name}
  tags: [micro-rts, dreamerv4, pretrain, tokenizer, phase1, v2, terminal-frames]
