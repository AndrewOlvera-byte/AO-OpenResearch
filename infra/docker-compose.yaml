services:
  research:
    build:
      # The root context is allow-listed by .dockerignore to only the dependency
      # manifest and the MicroRTS jar patch. Source/data stay on the host.
      context: ..
      dockerfile: infra/Dockerfile
    image: ao-openresearch:latest
    container_name: ao-research

    # GPU access for RTX 5070 Ti (Blackwell / sm_120)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]

    # Shared memory for PyTorch DataLoader workers (default 64MB is too small)
    shm_size: "16gb"

    # Mount the repo for live code changes
    volumes:
      - ..:/workspace
      - ~/.cache/huggingface:/root/.cache/huggingface
      # Persist collected datasets to the repo's data/ dir while exposing the
      # canonical /data/micro-rts path inside the container (collect_mrts_data.py).
      - ../data:/data

    # Runtime secrets are loaded from the ignored root .env file. They are not
    # copied into the image or sent in the Docker build context.
    env_file:
      - ../.env

    stdin_open: true
    tty: true
    command: tail -f /dev/null

    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
